name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p dist

          GOOS=darwin  GOARCH=arm64 go build -ldflags "-X main.Version=${VERSION}" -o dist/gstash-darwin-arm64   ./cmd/gstash
          GOOS=darwin  GOARCH=amd64 go build -ldflags "-X main.Version=${VERSION}" -o dist/gstash-darwin-amd64   ./cmd/gstash
          GOOS=linux   GOARCH=amd64 go build -ldflags "-X main.Version=${VERSION}" -o dist/gstash-linux-amd64    ./cmd/gstash
          GOOS=linux   GOARCH=arm64 go build -ldflags "-X main.Version=${VERSION}" -o dist/gstash-linux-arm64    ./cmd/gstash
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.Version=${VERSION}" -o dist/gstash-windows-amd64.exe ./cmd/gstash

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: gstash ${{ github.ref_name }}
          body: |
            ## Installation

            Download the binary for your platform below, make it executable, and move it to your PATH.

            **macOS (Apple Silicon)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/gstash-darwin-arm64 -o gstash
            chmod +x gstash && mv gstash /usr/local/bin/
            ```

            **macOS (Intel)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/gstash-darwin-amd64 -o gstash
            chmod +x gstash && mv gstash /usr/local/bin/
            ```

            **Linux (amd64)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/gstash-linux-amd64 -o gstash
            chmod +x gstash && mv gstash /usr/local/bin/
            ```

            **Windows**
            Download `gstash-windows-amd64.exe` and add it to your PATH.

            ---
            See `checksums.txt` to verify your download.
          files: |
            dist/gstash-darwin-arm64
            dist/gstash-darwin-amd64
            dist/gstash-linux-amd64
            dist/gstash-linux-arm64
            dist/gstash-windows-amd64.exe
            dist/checksums.txt
          draft: false
          prerelease: false
